<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convite — Wallace & Erika</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#030b1a;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  padding:24px 0;
}

/* ══ CARD ══ */
.card {
  position:relative;
  width:390px;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 40px 100px rgba(0,0,0,0.95);
}

/* Imagem do convite ocupa todo o card */
.invite-img {
  width:100%;
  display:block;
}

/* ══ BOTÕES INVISÍVEIS sobre os ícones da imagem ══
   A imagem tem proporção vertical ~2.18:1
   390px wide → ~850px tall no browser
   Ícone relógio ≈ 63% do topo, ícone pin ≈ 63% do topo
   cada ícone ≈ 19% da largura, centro relógio ≈ 36%, centro pin ≈ 64%
*/
.btn-overlay {
  position:absolute;
  z-index:10;
  top:60%;
  left:0; right:0;
  height:13%;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:0;
  pointer-events:none; /* deixa o container passthrough */
}

/* Cada botão cobre exatamente o ícone + label */
.btn-icon {
  pointer-events:all;
  cursor:pointer;
  background:transparent;
  border:none;
  text-decoration:none;
  display:block;
  width:28%;
  height:100%;
  /* outline:1px solid red; */ /* debug - descomente para ver a área */
}
.btn-icon-gap {
  width:8%; /* espaço entre os dois botões */
  height:100%;
}

/* ══ MODAL ══ */
.modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(3,11,26,0.95); z-index:300;
  justify-content:center; align-items:center;
  backdrop-filter:blur(8px); padding:20px;
}
.modal-overlay.open { display:flex; }

@keyframes fadeUp {
  from{ opacity:0; transform:translateY(16px); }
  to{   opacity:1; transform:translateY(0); }
}

.modal {
  width:100%; max-width:360px;
  background:linear-gradient(160deg, #0d2045 0%, #071530 100%);
  border:1.5px solid rgba(180,145,60,0.65);
  border-radius:16px;
  padding:34px 26px 28px;
  position:relative;
  box-shadow:0 0 80px rgba(0,0,0,0.9);
  animation:fadeUp 0.35s ease both;
}
.modal-close {
  position:absolute; top:12px; right:16px;
  background:none; border:none;
  color:rgba(212,175,55,0.6); font-size:22px;
  cursor:pointer; transition:color 0.2s; line-height:1;
}
.modal-close:hover { color:#d4af37; }

.modal-title {
  font-family:"Great Vibes", cursive;
  font-size:34px; color:#d4af37;
  text-align:center; margin-bottom:4px;
}
.modal-sub {
  font-family:"Cinzel", serif; font-size:9px;
  color:rgba(212,175,55,0.7); letter-spacing:3px;
  text-align:center; text-transform:uppercase; margin-bottom:22px;
}
.modal label {
  display:block; font-family:"Cinzel", serif; font-size:9px;
  color:rgba(212,175,55,0.85); letter-spacing:2px;
  text-transform:uppercase; margin:13px 0 5px;
}
.modal input {
  width:100%; background:rgba(255,255,255,0.05);
  border:1px solid rgba(180,145,60,0.35); border-radius:8px;
  padding:11px 14px; color:#fff;
  font-family:"Cormorant Garamond", serif; font-size:16px;
  outline:none; transition:border-color 0.2s;
}
.modal input:focus { border-color:rgba(212,175,55,0.75); }
.modal input::placeholder { color:rgba(255,255,255,0.22); font-style:italic; }

.btn-confirm {
  width:100%; margin-top:22px; padding:14px;
  background:linear-gradient(135deg, #c8a84b, #d4af37, #b8942e);
  border:none; border-radius:8px;
  font-family:"Cinzel", serif; font-size:11px; font-weight:700;
  letter-spacing:3px; color:#071530; cursor:pointer;
  text-transform:uppercase;
  transition:opacity 0.2s, transform 0.15s;
  box-shadow:0 4px 24px rgba(212,175,55,0.3);
}
.btn-confirm:hover { opacity:0.9; transform:translateY(-1px); }
.btn-confirm:active { transform:translateY(0); }

/* ── Sucesso ── */
.success { display:none; text-align:center; padding:10px 0; }
@keyframes pop { from{transform:scale(0);}to{transform:scale(1);} }
.success-icon {
  font-size:52px; display:block; margin-bottom:14px;
  animation:pop 0.5s cubic-bezier(0.175,0.885,0.32,1.275) both;
}
.success-title {
  font-family:"Great Vibes", cursive; font-size:32px;
  color:#d4af37; margin-bottom:8px;
}
.success-msg {
  font-family:"Cormorant Garamond", serif; font-size:15px;
  color:rgba(255,255,255,0.78); line-height:1.8;
}
.success-name { color:#d4af37; font-weight:600; }
.success-note {
  display:inline-block; margin-top:16px; padding:9px 16px;
  border:1px solid rgba(180,145,60,0.35); border-radius:8px;
  font-family:"Cinzel", serif; font-size:8px;
  color:rgba(212,175,55,0.7); letter-spacing:1.5px; line-height:1.7;
}
</style>
</head>
<body>

<!-- ══ MODAL RSVP ══ -->
<div class="modal-overlay" id="modalRSVP">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>

    <div id="formState">
      <div class="modal-title">Confirmar Presença</div>
      <div class="modal-sub">Wallace & Erika · 30 de Maio de 2026</div>

      <label>Nome completo</label>
      <input type="text" id="rNome" placeholder="Seu nome completo" />

      <label>Telefone / WhatsApp</label>
      <input type="tel" id="rTel" placeholder="(11) 99999-9999" />

      <label>E-mail</label>
      <input type="email" id="rEmail" placeholder="seu@email.com" />

      <button class="btn-confirm" onclick="confirmar()">✓ &nbsp; Confirmar Minha Presença</button>
    </div>

    <div class="success" id="successState">
      <span class="success-icon">💛</span>
      <div class="success-title">Presença Confirmada!</div>
      <p class="success-msg">
        Que alegria, <span class="success-name" id="sNome"></span>!<br>
        Wallace & Erika estão ansiosos<br>
        para celebrar com você.<br><br>
        <strong style="color:#d4af37;letter-spacing:1px;">30 de Maio · 19h</strong>
      </p>
      <span class="success-note">
        Mensagem enviada para a madrinha<br>via WhatsApp ✓
      </span>
    </div>
  </div>
</div>

<script>
  function openModal() {
    document.getElementById("modalRSVP").classList.add("open");
  }

  function closeModal() {
    document.getElementById("modalRSVP").classList.remove("open");
    setTimeout(() => {
      document.getElementById("formState").style.display = "";
      document.getElementById("successState").style.display = "none";
      ["rNome","rTel","rEmail"].forEach(id => document.getElementById(id).value = "");
    }, 400);
  }

  document.getElementById("modalRSVP").addEventListener("click", e => {
    if (e.target.id === "modalRSVP") closeModal();
  });

  function confirmar() {
    const nome  = document.getElementById("rNome").value.trim();
    const tel   = document.getElementById("rTel").value.trim();
    const email = document.getElementById("rEmail").value.trim();

    if (!nome)          { alert("Por favor, informe seu nome."); return; }
    if (!tel && !email) { alert("Informe telefone ou e-mail."); return; }

    const msg = [
      "Olá! Gostaria de confirmar minha presença no casamento de Wallace & Erika 💛",
      "",
      "👤 Nome: " + nome,
      tel   ? "📱 Telefone: " + tel  : null,
      email ? "📧 E-mail: "  + email : null,
      "",
      "📅 30 de Maio de 2026 · 19h",
      "📍 Av. dos Guatambus, 53 — Eldorado, SP"
    ].filter(l => l !== null).join("\n");

    window.open(
      "https://wa.me/5511954655710?text=" + encodeURIComponent(msg),
      "_blank"
    );

    document.getElementById("sNome").textContent = nome.split(" ")[0];
    document.getElementById("formState").style.display = "none";
    document.getElementById("successState").style.display = "block";
  }
</script>
